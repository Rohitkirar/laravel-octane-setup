services:
  # ── Laravel Octane app (RoadRunner) ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: octane_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: "${APP_ENV}"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL}"
      OCTANE_SERVER: "${OCTANE_SERVER}"
      OCTANE_WORKERS: "${OCTANE_WORKERS}"
      OCTANE_MAX_REQUESTS: "${OCTANE_MAX_REQUESTS}"
      DB_CONNECTION: "${DB_CONNECTION}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      CACHE_STORE: "${CACHE_STORE}"
      SESSION_DRIVER: "${SESSION_DRIVER}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION}"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - storage_data:/var/www/html/storage
    expose:
      - "8000"
    networks:
      - octane_net

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: octane_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - octane_net

  # ── Queue worker ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: octane_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: "${APP_ENV}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: "${DB_CONNECTION}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION}"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - storage_data:/var/www/html/storage
    entrypoint: []
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - octane_net

volumes:
  storage_data:

networks:
  octane_net:
    driver: bridge
